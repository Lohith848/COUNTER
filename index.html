<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ring of Dominance — Akira vs Ryuga 2D Boxing</title>
    <meta name="description" content="An adaptive 2D boxing fighting game. Play as Akira and fight Ryuga, the AI-controlled adaptive opponent that learns your patterns." />
    <!-- Google Fonts for premium retro-modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      /* Reset and base page layout */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0c10;
        color: #c5c6c7;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      /* Game container to keep it clean and centered */
      #game-container {
        width: 100%;
        height: 100%;
        max-width: 1280px;
        max-height: 720px;
        aspect-ratio: 16 / 9;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 0, 85, 0.15);
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        background-color: #000;
        border: 2px solid rgba(255, 255, 255, 0.05);
      }

      /* Desktop scanline/arcade retro filter overlay */
      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
        background-size: 100% 4px, 6px 100%;
        z-index: 100;
        pointer-events: none;
        opacity: 0.4;
      }

      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="app"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
